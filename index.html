<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benjamin Graham Stock Valuer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Benjamin Graham Stock Valuation</h2>

    <!-- Stock Name Search Box -->
    <div class="search-box">
      <label for="stock-name">Search Company Name:</label>
      <div class="input-inline">
        <input type="text" id="stock-name" placeholder="e.g. Reliance, Tata Motors, Apple">
        <button type="button" id="search-btn">Search & Auto-Fill</button>
      </div>
      <small id="selected-symbol-text" style="color: #2563eb; font-weight: 600;"></small>
    </div>

    <form id="calc-form">
      <div class="input-group">
        <label for="cmp">Current Market Price (CMP):</label>
        <input type="number" id="cmp" step="0.01" placeholder="e.g. 150" required>
      </div>

      <div class="input-group">
        <label for="eps">Earnings Per Share (EPS):</label>
        <input type="number" id="eps" step="0.01" placeholder="e.g. 10" required>
      </div>

      <div class="input-group">
        <label for="bvps">Book Value Per Share (BVPS):</label>
        <input type="number" id="bvps" step="0.01" placeholder="e.g. 50" required>
      </div>

      <div class="input-group">
        <label for="growth">Expected Growth Rate % (g):</label>
        <input type="number" id="growth" step="0.1" placeholder="e.g. 7" required>
      </div>

      <div class="input-group">
        <label for="bondYield">AAA Bond Yield % (Y):</label>
        <input type="number" id="bondYield" step="0.1" value="7.5" required>
      </div>

      <button type="submit">Calculate Valuation</button>
    </form>

    <div id="results" class="results-card hidden">
      <h3>Valuation Summary</h3>
      <div class="metric">
        <span>Graham Number:</span>
        <strong id="graham-number">-</strong>
      </div>
      <div class="metric">
        <span>Intrinsic Value (Formula):</span>
        <strong id="intrinsic-value">-</strong>
      </div>
      <div class="status" id="valuation-status"></div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
